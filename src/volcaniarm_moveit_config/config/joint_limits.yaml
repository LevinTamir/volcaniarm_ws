# Velocity/acceleration limits for time-parameterization of the phantom planning
# joints (the EE Y-Z prismatic DOF that MoveIt plans). Units: m/s, m/s^2.
default_velocity_scaling_factor: 0.5
default_acceleration_scaling_factor: 0.5

joint_limits:
  tool_joint_y:
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 1.0
  tool_joint_z:
    has_velocity_limits: true
    max_velocity: 0.5
    has_acceleration_limits: true
    max_acceleration: 1.0

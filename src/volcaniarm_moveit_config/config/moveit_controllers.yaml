# MoveIt executes the planned phantom (EE Y-Z) trajectory to the
# joint_state_transformer node, which it treats as an ordinary
# FollowJointTrajectory controller. The transformer runs inverse_ee to convert
# the phantom trajectory into the real elbow trajectory and forwards it to the
# JTC (/volcaniarm_controller/follow_joint_trajectory).
#
# Resolved action: /joint_state_transformer/follow_joint_trajectory
moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager

trajectory_execution:
  allowed_execution_duration_scaling: 1.2
  allowed_goal_duration_margin: 0.5
  allowed_start_tolerance: 0.05

moveit_simple_controller_manager:
  controller_names:
    - joint_state_transformer

  joint_state_transformer:
    type: FollowJointTrajectory
    action_ns: follow_joint_trajectory
    default: true
    joints:
      - tool_joint_y
      - tool_joint_z

volcaniarm:
  kinematics_solver: volcaniarm_ik_plugin/VolcaniarmIKPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.005
  # Planar five-bar: orientation is fully determined by the EE position, so the
  # plugin solves from the target position only.
  position_only_ik: true

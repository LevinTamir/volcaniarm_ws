controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    volcaniarm_controller:
      type: volcaniarm_controller/ClosedLoopTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster


volcaniarm_controller:
  ros__parameters:
    joints:
      - volcaniarm_right_elbow_joint
      - volcaniarm_left_elbow_joint

    command_interfaces:
     - position

    state_interfaces:
     - position

    open_loop_control: true
    allow_integration_in_goal_trajectories: true

    # Closed-loop passive joint configuration
    left_elbow_joint: volcaniarm_left_elbow_joint
    right_elbow_joint: volcaniarm_right_elbow_joint

    passive_joints:
      - volcaniarm_left_arm_joint
      - volcaniarm_right_arm_joint
      - closure_joint

    # End-effector marker visualization
    ee_marker:
      enable: true
      frame_id: volcaniarm_base_link
      tool_offset: 0.0   # Tool X offset from end-effector [m]
      trail_size: 300

    # 5-bar linkage kinematic parameters
    kinematics:
      L1: 0.41621         # Upper link length (elbow link) [m]
      L2: 0.62243         # Lower link length (arm link) [m]
      l0: 0.215           # Shoulder separation from center [m]
      base_z: 0.0632      # Elbow joint Z offset in volcaniarm_base_link [m]
      left_elbow_rpy: 0.7854    # Left elbow joint Rx offset [rad]
      right_elbow_rpy: -0.7854  # Right elbow joint Rx offset [rad]
      left_arm_rpy: -1.7053     # Left arm joint Rx offset [rad]
      right_arm_rpy: 1.7053     # Right arm joint Rx offset [rad]
      closure_rpy: 1.8398       # Closure joint Rx offset [rad]

/**:
  ros__parameters:
    # Image transport
    image_transport: raw
    # AprilTag family (36h11 is the most robust)
    family: 36h11
    # Default tag edge size in meters (active/black-square size)
    size: 0.064
    # Reject detections with bit errors above this threshold
    max_hamming: 0
    # QoS profile for image subscription
    qos_profile: sensor_data

    # Detector tuning
    detector:
      threads: 4
      decimate: 1.0
      blur: 0.0
      refine: true
      sharpening: 0.25
      debug: false

    # Pose estimation: "pnp" (more accurate) or "homography" (faster)
    pose_estimation_method: "pnp"

    # Tag configuration
    # ID 20: EE marker (apriltag_marker_ee)
    # ID 5:  base-link reference marker (apriltag_marker_base)
    tag:
      ids: [20, 5]
      frames: [apriltag_marker_ee, apriltag_marker_base]
      sizes: [0.064, 0.064]

/**:
  ros__parameters:
    # Image transport
    image_transport: raw
    # AprilTag family (36h11 is the most robust)
    family: 36h11
    # Default tag edge size in metres (active black-square length).
    # Both the real printed tags and the sim DAE meshes default to
    # 0.064. Override via the `tag_size:=` launch arg (forwarded by
    # both bringup launches into the dashboard and the URDF xacro)
    # when running with the larger 0.200 prints.
    size: 0.064
    # Strict decoding. The 36h11 family has Hamming distance 11, so
    # 0-bit-error rejection still gives essentially zero false-positive
    # risk while keeping pose estimates clean. Bump to 1 only if real
    # detections are dropped at edge poses.
    max_hamming: 0
    # QoS profile for image subscription
    qos_profile: sensor_data

    # Detector tuning. Originally calibrated for 0.200 m tags at
    # ~1.5 m standoff (~90 px tag, ~11 px per bit). With 0.064 m
    # tags at the same standoff that drops to ~28 px / ~3.5 px per
    # bit, which is close to the 36h11 floor — bring the camera in
    # to ~0.5–0.8 m for reliable detection, or override
    # `tag_size:=0.200` and use the larger printed tags. The knobs
    # below favour sub-pixel corner accuracy and marginal-decode
    # robustness, both of which matter more at small pixel sizes.
    detector:
      threads: 4
      # 1.0 = no quad-decimation pre-pass. Larger values speed up
      # detection but truncate corner precision; at our tag size
      # accuracy matters more than ms per frame.
      decimate: 1.0
      # No pre-blur for sim renders (clean image, no sensor noise).
      # Bump to ~0.8 on the real camera if motion blur appears.
      blur: 0.0
      # Sub-pixel corner refinement. ESSENTIAL for accurate pose;
      # without it corners snap to integer pixels and pose estimates
      # quantise visibly at this distance.
      refine: true
      # Sharpening of the warped tag image before decoding. 0.5
      # (vs the apriltag default of 0.25) helps marginal decodes at
      # perspective-distorted poses without affecting corner accuracy.
      sharpening: 0.5
      debug: false

    # PnP solves the full 6-DoF pose from the four corner pixel
    # locations and the known tag size, using the camera_info K matrix.
    # Strictly more accurate than the homography fallback because it
    # accounts for lens intrinsics; required for the calibration runs
    # since the residuals we report are in metres.
    pose_estimation_method: "pnp"

    # Tag configuration
    # ID 20: EE marker (apriltag_marker_ee)
    # ID 5:  base-link reference marker (apriltag_marker_base)
    # Per-tag sizes: are intentionally omitted so the top-level `size`
    # applies to every tag. Both sim and real use 0.064 from this
    # yaml unless `tag_size:=` overrides it from the launch file.
    tag:
      ids: [20, 5]
      frames: [apriltag_marker_ee, apriltag_marker_base]

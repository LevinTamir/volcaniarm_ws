accuracy_test_node:
  ros__parameters:
    # Which test class to run (see TEST_REGISTRY in
    # volcaniarm_calibration/runner/tests/__init__.py).
    test_type: static_accuracy

    # -- Pose configuration --
    # Initial pose: where the arm parks at run start and between
    # iterations. Goal pose: the single target visited each iteration.
    # Both are in workspace (y, z) metres in volcaniarm_base_link
    # frame, resolved to joint angles via compute_ik before any motion.
    initial_y: 0.0
    initial_z: 0.5
    goal_y: 0.0
    goal_z: 0.6

    # -- Test routine --
    # Number of iterations (one goal visit each).
    num_cycles: 5
    # Seconds to wait after each move for motors and camera to settle.
    settle_time: 2.0
    # Number of pose samples to average at each settled visit.
    samples_per_visit: 20
    # Delay between consecutive pose samples [s].
    sample_interval: 0.1

    # -- Arm control --
    joint_names:
      - volcaniarm_right_elbow_joint
      - volcaniarm_left_elbow_joint
    trajectory_duration: 2.0

    # -- AprilTag tracking --
    # Tag frames published by the apriltag detector. Ground truth is
    # T(base_tag -> ee_tag) looked up via TF (resolved through the
    # camera). Compared against FK in post-processing after applying
    # the known link->tag offsets.
    base_tag_frame: apriltag_marker_base
    ee_tag_frame: apriltag_marker_ee

    # -- Output --
    # Per-run directory layout: <output_dir>/<test_type>/<YYYY-MM-DD>/<HH-MM-SS>/
    output_dir: ~/workspaces/volcaniarm_ws/src/volcaniarm_calibration/data

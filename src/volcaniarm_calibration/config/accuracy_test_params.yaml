accuracy_test_node:
  ros__parameters:
    # Which test class to run (see TEST_REGISTRY in
    # volcaniarm_calibration/runner/tests/__init__.py).
    test_type: static_accuracy

    # -- Pose configuration --
    # Initial pose: where the arm parks at run start and between
    # visits. In workspace (y, z) metres in volcaniarm_base_link
    # frame, resolved to joint angles via compute_ik before any motion.
    initial_y: 0.0
    initial_z: 0.5
    # Goals: flat list of (y, z) pairs the arm visits each iteration.
    # Single-pose tests (static_accuracy / repeatability) use one
    # pair; the workspace_coverage test takes the full envelope.
    # Format: [y0, z0, y1, z1, y2, z2, ...]
    goals: [0.0, 0.6]

    # -- Test routine --
    # Number of iterations (one goal visit each).
    num_cycles: 5
    # Seconds to wait after each move for motors and camera to settle.
    settle_time: 2.0

    # -- Arm control --
    joint_names:
      - volcaniarm_right_elbow_joint
      - volcaniarm_left_elbow_joint
    trajectory_duration: 2.0

    # -- AprilTag tracking --
    # Tag frames published by the apriltag detector. Detected segment
    # length is computed from T(base_tag -> ee_tag) via TF.
    base_tag_frame: apriltag_marker_base
    ee_tag_frame: apriltag_marker_ee
    # URDF-side counterparts: published by robot_state_publisher from
    # the static apriltag mount joints + live arm FK. Provide the
    # ground-truth segment-length expectation against which the
    # detection is compared at every capture.
    base_urdf_frame: apriltag_base_link
    ee_urdf_frame: apriltag_ee_link
    # Common world-aligned frame both detection and URDF marker origins
    # are looked up in before the Y-Z difference is computed. The
    # apriltag_marker_* and apriltag_*_link parents have different
    # orientations, so comparing their Y-Z components directly is
    # wrong; expressing both origins in a single world-aligned frame
    # makes Y and Z refer to the same physical axes for both.
    world_frame: world
    # Per-lookup wait budget on the apriltag TF (s).
    detection_timeout_s: 1.0
    # Freshness window for the dashboard's continue gate (s); also
    # shapes how long stamp progression is treated as 'just arrived'.
    detection_max_age_s: 0.5

    # -- Repeatability home-confirm gate --
    # Used by tests that set verify_home_with_tag (the repeatability
    # test does, by construction). After every return-to-home, the
    # runner waits for |d_detected - d_urdf| < home_tol_m to hold over
    # home_hold_frames consecutive fresh detections, bounded by
    # home_timeout_s. Aborts the run on timeout with a clear reason.
    home_tol_m: 0.02
    home_hold_frames: 5
    home_timeout_s: 10.0

    # -- Output --
    # Per-run directory layout: <output_dir>/<test_type>/<YYYY-MM-DD>/<HH-MM-SS>/
    output_dir: ~/workspaces/volcaniarm_ws/src/volcaniarm_calibration/data

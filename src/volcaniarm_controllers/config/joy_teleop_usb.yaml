volcaniarm_joystick_teleop:
  ros__parameters:
    # USB profile. The gamepad enumerates differently over USB vs
    # Bluetooth, so the button/axis indices live in per-connection
    # profiles. See joy_teleop_bt.yaml for the Bluetooth variant.
    # Pick one at launch with joy_profile:=usb|bt.

    # Integration / publish rate
    rate_hz: 20.0

    # Hold-to-activate button (axes ignored unless held).
    # 5 = RB (Xbox) / R1 (PS) over USB. (= button 7 over Bluetooth)
    deadman_button: 5

    # Axis mappings: left-stick X -> EE Y (arm plane),
    #                left-stick Y -> EE Z (world up).
    # Left stick is axes 0/1 over both USB and Bluetooth.
    axis_y: 0
    axis_z: 1
    invert_y: false
    invert_z: false

    # Max velocities at full stick deflection [m/s].
    scale_y: 0.15
    scale_z: 0.15

    # Workspace clamps [m] — keep in sync with
    # volcaniarm_kinematics IK workspace box.
    y_min: -0.35
    y_max:  0.35
    z_min:  0.30
    z_max:  1.00

    # How far ahead each published trajectory point targets [s].
    # Long enough that consecutive points interpolate smoothly,
    # short enough that the controller tracks the stick responsively.
    trajectory_horizon: 0.2

    # Published trajectory topic + joint order (must match
    # volcaniarm_controllers.yaml "joints" order: right first, left second).
    trajectory_topic: /volcaniarm_controller/joint_trajectory
    joint_names:
      - volcaniarm_right_elbow_joint
      - volcaniarm_left_elbow_joint

    # Home: deadman + this button publishes one trajectory point sending
    # both elbows to home_positions over home_duration_sec. 0 is
    # X (Xbox) / square (PS) over USB. After triggering, release+repress
    # the deadman to resume stick teleop from the new pose.
    home_button: 0
    # Order MUST match joint_names above (right first, left second).
    home_positions: [0.0, 0.0]
    home_duration_sec: 3.0

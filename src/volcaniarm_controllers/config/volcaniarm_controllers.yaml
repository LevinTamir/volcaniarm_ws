controller_manager:
  ros__parameters:
    update_rate: 100 # Hz

    # Actives: stock joint_trajectory_controller (the closed-loop subclass was
    # retired; closure math now lives in volcaniarm_kinematics).
    volcaniarm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Passives + full joint state: the single /joint_states source.
    volcaniarm_passive_broadcaster:
      type: volcaniarm_controller/PassiveBroadcaster


volcaniarm_controller:
  ros__parameters:
    joints:
      - volcaniarm_right_elbow_joint
      - volcaniarm_left_elbow_joint

    command_interfaces:
     - position

    state_interfaces:
     - position

    open_loop_control: true
    allow_integration_in_goal_trajectories: true


volcaniarm_passive_broadcaster:
  ros__parameters:
    left_elbow_joint: volcaniarm_left_elbow_joint
    right_elbow_joint: volcaniarm_right_elbow_joint

    # Order matters: [left_arm, right_arm, closure].
    passive_joints:
      - volcaniarm_left_arm_joint
      - volcaniarm_right_arm_joint
      - closure_joint

    # End-effector marker visualization (published off the RT path).
    ee_marker:
      enable: true
      frame_id: volcaniarm_base_link
      tool_offset: 0.0   # Tool X offset from end-effector [m]
      trail_size: 300

    # Kinematic geometry (L1/L2/l0/base_z/arm_lateral + rpy offsets) is derived
    # from robot_description at runtime - the URDF is the single source of truth.
    # The Pinocchio CI oracle guards against URDF/code drift.

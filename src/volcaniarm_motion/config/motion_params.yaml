volcaniarm_kinematics:
  ros__parameters:
    # Link lengths
    L1: 0.41621           # Upper link (elbow) [m]
    L2: 0.6225            # Lower link (arm) [m]
    l0: 0.215             # Shoulder separation from center [m]
    base_z: 0.0582        # Shoulder Z offset in FK model [m]

    # FK ↔ URDF angle offsets
    left_fk_offset: 2.356   # ~3*pi/4
    right_fk_offset: 0.7854 # ~pi/4

    # Workspace safety limits (volcaniarm_base_link frame, +Z = down)
    workspace:
      y_min: -0.35
      y_max: 0.35
      z_min: 0.3
      z_max: 1.0

    # URDF joint angle limits
    joint_limits:
      min: -3.14
      max: 3.14


motion_planning_node:
  ros__parameters:
    # Topic / frame configuration
    weed_topic: /weed_position
    arm_frame: volcaniarm_base_link

    # Joint names (must match controller config)
    joint_names:
      - volcaniarm_right_elbow_joint
      - volcaniarm_left_elbow_joint

    # Trajectory timing
    trajectory_duration: 2.0   # Time to reach target [s]
    dwell_time: 2.0            # Time to stay at target before returning home [s]
    home_duration: 2.0         # Time to return home [s]

    # Home position (URDF joint angles [right, left])
    home_position: [0.0, 0.0]
    return_home: true

    # Target queue
    queue_size: 10

    # Calibration offsets (applied after TF transform, in base_link frame)
    offset_y: 0.0    # Lateral correction [m] — positive shifts target in +Y
    offset_z: 0.0    # Vertical correction [m] — positive shifts target downward
